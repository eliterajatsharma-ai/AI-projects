<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .links {
            margin-top: 40px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        footer {
            margin-top: 40px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Projects</h1>
        <p class="subtitle">Cool AI Project Ideas & Implementations</p>
        
        <div class="features">
            <div class="feature">
                <h3>💡 Innovation</h3>
                <p>Cutting-edge AI solutions</p>
            </div>
            <div class="feature">
                <h3>🚀 Performance</h3>
                <p>Fast & efficient systems</p>
            </div>
            <div class="feature">
                <h3>🔧 Scalable</h3>
                <p>Built for growth</p>
            </div>
        </div>
        
        <div class="links">
            <a href="https://github.com/eliterajatsharma-ai/AI-projects" class="btn">View on GitHub</a>
            <a href="https://github.com/eliterajatsharma-ai" class="btn">My Profile</a>
        </div>
        
        <footer>
            <p>Made with ❤️ by eliterajatsharma-ai</p>
            <p>© 2026 All Rights Reserved</p>
        </footer>
    </div>
</body>
</html>
